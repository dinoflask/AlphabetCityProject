{% load static %}
<!doctype html>
<html lang="en-US">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tell a Story · Alphabet City Project</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{% static 'alphabetcity/css/tokens.css' %}" />
  <link rel="stylesheet" href="{% static 'alphabetcity/css/welcome.css' %}" />
</head>

<body>
  <main class="welcome" data-next="{% url 'login' %}">
    <div class="welcome__scenery" aria-hidden="true"
         style="background-image: url('{% static 'alphabetcity/img/welcome-scenery.png' %}');"></div>
    <div class="welcome__texture" aria-hidden="true"></div>

    <img class="welcome__logo" src="{% static 'alphabetcity/img/welcome-logo.png' %}" alt="City of Asylum" />

    <div class="welcome__content">
      <h1 class="welcome__title" aria-label="Tell a Story. Alphabet City Project.">
        <span class="welcome__title-line" data-splittext>TELL A STORY</span>
        <span class="welcome__title-line" data-splittext>ALPHABET CITY PROJECT</span>
      </h1>

      <button type="button" class="welcome__enter" aria-label="Enter">
        <span class="welcome__enter-text" data-splittext>Enter</span>
        <svg class="welcome__arrow" viewBox="0 0 10 22" fill="none" aria-hidden="true">
          <!-- One continuous stroke: tail (5,21) up the shaft to the tip, then
               the chevron. pathLength=100 normalises the dash math. -->
          <path class="welcome__arrow-path" pathLength="100" d="M5,21 L5,2 M1,6 L5,2 L9,6" />
        </svg>
      </button>
    </div>

    <footer class="welcome__footer">
      <nav class="welcome__langs" aria-label="Language">
        <button type="button" class="welcome__lang is-active">EN</button>
        <button type="button" class="welcome__lang">MY</button>
        <button type="button" class="welcome__lang">UK</button>
      </nav>
      <a class="welcome__privacy" href="#">PRIVACY INFORMATION</a>
    </footer>

    <div class="welcome__fade" aria-hidden="true"></div>
  </main>

  <script src="{% static 'alphabetcity/js/welcome.js' %}" defer></script>
</body>

</html>
